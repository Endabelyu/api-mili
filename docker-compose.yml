services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mili-api
    ports:
      - "4015:4015"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4015
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_TOPIC_FRONTEND=${TELEGRAM_TOPIC_FRONTEND}
      - TELEGRAM_TOPIC_BACKEND=${TELEGRAM_TOPIC_BACKEND}
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4015/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mili-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mili-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - mili-network


volumes:
  postgres_data:

networks:
  finance-tracker-network:
    name: mili-network
